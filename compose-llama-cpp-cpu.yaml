services:
  llama-server-cpu:
    image: ghcr.io/ggml-org/llama.cpp:server-b9038
    container_name: llama-server-cpu
    restart: unless-stopped
    ports:
    - 8791:8080
    volumes:
    - ${PWD}/models:/models
    - ${PWD}/.cache/:/root/.cache/
    env_file:
    - ${PWD}/.env
    environment:
      # --- Strategy A: download from HF on first start ---
      LLAMA_ARG_HF_REPO: unsloth/Qwen3-14B-GGUF
      LLAMA_ARG_HF_FILE: Qwen3-14B-IQ4_XS.gguf

      # --- Strategy B: pre-downloaded file (comment A above, uncomment below) ---
      # LLAMA_ARG_MODEL: /models/*.gguf

      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_CTX_SIZE: "8192"
      LLAMA_ARG_THREADS: "16"
      LLAMA_ARG_N_PARALLEL: "2"
      LLAMA_ARG_CONT_BATCHING: "1"
      LLAMA_ARG_FLASH_ATTN: "1"
      LLAMA_ARG_ENDPOINT_METRICS: "1"
    deploy:
      resources:
        limits:
          memory: 16g
